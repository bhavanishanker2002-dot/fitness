var MN={fontFamily:"'DM Mono',monospace"};
function nowTs(){return new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",hour12:false}).replace(","," —")}

function scoreEntry(f,hiddenIds,customIds){
  var coreIds=["c1","c2","c3","c4","c5","c6","c7","c8"];
  var visibleCore=coreIds.filter(function(id){return (hiddenIds||[]).indexOf(id)===-1});
  var coreOn=visibleCore.filter(function(id){return !!f[id]}).length;
  var cIds=customIds||[];
  var custOn=cIds.filter(function(id){return f.cust&&f.cust[id]}).length;
  return {score:coreOn+custOn,max:visibleCore.length+cIds.length};
}
function scoreEntryLegacy(f){return[f.c1,f.c2,f.c3,f.c4,f.c5,f.c6,f.c7,f.c8].filter(Boolean).length}
function pipSz(p){return p&&p.toUpperCase().includes("JPY")?0.01:0.0001}
function pipVal(p,price){return p&&p.toUpperCase().includes("JPY")?1000/(price||150):10}
function calcLots(pair,entry,sl,riskPct,acct){
  var e=parseFloat(entry),s=parseFloat(sl),r=parseFloat(riskPct),a=parseFloat(acct);
  if(!e||!s||!r||!a||e===s)return null;
  return Math.floor((a*r/100)/(Math.abs(e-s)/pipSz(pair)*pipVal(pair,e))*100)/100;
}
function calcRR(e,sl,tp,dir){
  var ev=parseFloat(e),sv=parseFloat(sl),tv=parseFloat(tp);
  if(!ev||!sv||!tv||ev===sv)return null;
  return parseFloat(((dir==="BUY"?tv-ev:ev-tv)/Math.abs(ev-sv)).toFixed(2));
}
function rrC(r){return r>=4?"#34d399":r>=2?"#c8f135":r>=1?"#f0a500":"#ff4444"}
function parseDate(ts){if(!ts)return null;try{if(ts instanceof Date){return isNaN(ts)?null:ts;}var s=String(ts).trim();s=s.replace(/\s*[—–]\s*/g," ").replace(/\s+/g," ");var d=new Date(s);if(!isNaN(d))return d;var iso=s.replace(/ /g,"T");d=new Date(iso);return isNaN(d)?null:d}catch(e){return null}}
function dKey(d){if(!d)return null;var dt=d instanceof Date?d:new Date(d);if(isNaN(dt))return null;return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0")}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmtC(n){if(n==null||isNaN(n))return"–";var s=Math.abs(n)>=1000?"$"+(Math.abs(n)/1000).toFixed(1)+"k":"$"+Math.abs(n).toFixed(0);return n<0?"-"+s:"+"+s}
function fmtP(n){return n==null||isNaN(n)?"–":(n>=0?"+":"")+n.toFixed(2)+"%"}
function getWk(d){var t=new Date(d);t.setHours(0,0,0,0);var day=t.getDay()||7;t.setDate(t.getDate()+1-day);return t.toISOString().substring(0,10)}

// ── PER-ACCOUNT RESULT ──
function getAccRes(trade,firmId){
  var root={outcome:trade.outcome||"",actualPct:trade.actualPct||"",exitPrice:trade.exitPrice||"",exitWhy:trade.exitWhy||"",afterNotes:trade.afterNotes||"",photoAfter:trade.photoAfter||"",exitTimestamp:trade.exitTimestamp||"",xc1:trade.xc1||false,xc2:trade.xc2||false,xc3:trade.xc3||false,xc4:trade.xc4||false};
  if(firmId==null)return root;
  var ar=trade.accountResults||{};
  return ar[String(firmId)]?ar[String(firmId)]:root;
}
// Returns best closed outcome for a trade across ALL accounts (perf/calendar/statsbar)
function getCanonicalRes(trade){
  var root={outcome:trade.outcome||"",actualPct:trade.actualPct||"",exitPrice:trade.exitPrice||"",exitWhy:trade.exitWhy||"",afterNotes:trade.afterNotes||"",photoAfter:trade.photoAfter||"",exitTimestamp:trade.exitTimestamp||"",xc1:trade.xc1||false,xc2:trade.xc2||false,xc3:trade.xc3||false,xc4:trade.xc4||false};
  if(root.outcome&&!root.outcome.includes("Running")&&root.actualPct!=="")return root;
  var ar=trade.accountResults||{};
  var ids=trade.firmIds||[];
  for(var i=0;i<ids.length;i++){var r=ar[String(ids[i])];if(r&&r.outcome&&!r.outcome.includes("Running")&&r.actualPct!==""&&r.actualPct!=null)return r;}
  var keys=Object.keys(ar);
  for(var j=0;j<keys.length;j++){var r2=ar[keys[j]];if(r2&&r2.outcome&&!r2.outcome.includes("Running")&&r2.actualPct!==""&&r2.actualPct!=null)return r2;}
  return root;
}
function saveOneAcc(trade,firmId,data){
  if(firmId==null)return data;
  var ar=Object.assign({},trade.accountResults||{});
  ar[String(firmId)]=data;
  return{accountResults:ar};
}
function saveAllAcc(trade,data){
  var ar=Object.assign({},trade.accountResults||{});
  (trade.firmIds||[]).forEach(function(id){ar[String(id)]=data;});
  return Object.assign({},data,{accountResults:ar});
}
function tradePnl(t,acctSize,firmId){
  var r=getAccRes(t,firmId);
  var p=parseFloat(r.actualPct);
  return isNaN(p)?null:(parseFloat(acctSize)||100000)*p/100;
}
// ── PERFORMANCE HELPERS ──
function perfClosedTrades(trades){
  return (trades||[]).filter(function(t){
    var r=getCanonicalRes(t);
    return r.outcome && !r.outcome.includes("Running") && r.actualPct!=="" && r.actualPct!=null && !isNaN(parseFloat(r.actualPct));
  });
}
function perfMonthKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function perfMonthlyMap(trades){
  var m={};
  perfClosedTrades(trades).forEach(function(t){
    var d=parseDate(t.timestamp); if(!d) return;
    var k=perfMonthKey(d), p=parseFloat(getCanonicalRes(t).actualPct)||0;
    if(!m[k]) m[k]={ret:0,trades:0,wins:0,losses:0};
    m[k].ret+=p; m[k].trades++;
    if(p>0)m[k].wins++; else if(p<0)m[k].losses++;
  });
  return m;
}
function perfOrderedMonthKeys(m){
  return Object.keys(m).sort(function(a,b){return new Date(a+"-01")-new Date(b+"-01")});
}
function perfMean(arr){if(!arr.length)return 0; return arr.reduce(function(a,b){return a+b},0)/arr.length}
function perfStd(arr){
  if(arr.length<2)return 0;
  var mu=perfMean(arr);
  var v=arr.reduce(function(a,b){return a+Math.pow(b-mu,2)},0)/(arr.length-1);
  return Math.sqrt(v);
}
function perfDownsideDev(arr){
  var neg=arr.filter(function(x){return x<0});
  if(!neg.length)return 0;
  var v=neg.reduce(function(a,b){return a+Math.pow(b,2)},0)/neg.length;
  return Math.sqrt(v);
}
function perfAnnualized(monthlyReturns){
  if(!monthlyReturns.length)return 0;
  var eq=1;
  monthlyReturns.forEach(function(r){eq*=(1+r/100);});
  return (Math.pow(eq,12/monthlyReturns.length)-1)*100;
}
function perfEquitySeries(trades){
  var closed=perfClosedTrades(trades).slice().sort(function(a,b){return (parseDate(a.timestamp)||0)-(parseDate(b.timestamp)||0)});
  var eq=100, out=[{date:null,bal:eq,pct:0}];
  closed.forEach(function(t){
    var p=parseFloat(getCanonicalRes(t).actualPct)||0;
    eq=eq*(1+p/100);
    out.push({date:parseDate(t.timestamp),bal:eq,pct:p,trade:t});
  });
  return out;
}
function perfDrawdownSeries(equity){
  var peak=equity.length?equity[0].bal:100;
  var arr=[], maxDD=0, curStart=null, maxDur=0;
  equity.forEach(function(e){
    if(e.bal>peak){peak=e.bal;}
    var dd=peak?((e.bal-peak)/peak*100):0;
    arr.push({date:e.date,dd:dd,bal:e.bal});
    if(dd<maxDD)maxDD=dd;
  });
  var runStart=null,runPeak=equity.length?equity[0].bal:100, lastDate=null;
  equity.forEach(function(e){
    if(e.bal>=runPeak){runPeak=e.bal; runStart=e.date;}
    if(e.bal<runPeak && runStart && e.date){ lastDate=e.date; }
    if(e.bal>=runPeak && runStart && lastDate){
      var dur=Math.floor((e.date-lastDate)/86400000);
      if(dur>maxDur)maxDur=dur;
      lastDate=null;
    }
  });
  var currentDD=arr.length?arr[arr.length-1].dd:0;
  return {series:arr,maxDD:Math.abs(maxDD),currentDD:Math.abs(currentDD),maxDuration:maxDur};
}
function perfPFExpectancy(trades){
  var closed=perfClosedTrades(trades);
  var wins=closed.filter(function(t){return parseFloat(getCanonicalRes(t).actualPct)>0});
  var losses=closed.filter(function(t){return parseFloat(getCanonicalRes(t).actualPct)<0});
  var gp=wins.reduce(function(a,t){return a+parseFloat(getCanonicalRes(t).actualPct)},0);
  var gl=Math.abs(losses.reduce(function(a,t){return a+parseFloat(getCanonicalRes(t).actualPct)},0));
  var pf=gl>0?gp/gl:(wins.length?99:0);
  var aw=wins.length?gp/wins.length:0;
  var al=losses.length?gl/losses.length:0;
  var tot=closed.length;
  var exp=tot?((wins.length/tot)*aw)-((losses.length/tot)*al):0;
  return {pf:pf,exp:exp,wins:wins.length,losses:losses.length,total:tot};
}
function perfAvgRAndStreaks(trades){
  var closed=perfClosedTrades(trades).slice().sort(function(a,b){return (parseDate(a.timestamp)||0)-(parseDate(b.timestamp)||0)});
  var rs=[], cw=0,cl=0,mw=0,ml=0;
  closed.forEach(function(t){
    var ap=parseFloat(getCanonicalRes(t).actualPct), rp=parseFloat(t.riskPct||0);
    var r=(!isNaN(ap)&&!isNaN(rp)&&rp>0)?(ap/rp):null;
    if(r!=null && isFinite(r))rs.push(r);
    if(ap>0){cw++;cl=0;if(cw>mw)mw=cw;}
    else if(ap<0){cl++;cw=0;if(cl>ml)ml=cl;}
    else{cw=0;cl=0;}
  });
  return {avgR:rs.length?perfMean(rs):0,maxWins:mw,maxLosses:ml,rValues:rs};
}
function perfSetupWinRates(trades){
  var closed=perfClosedTrades(trades), m={};
  closed.forEach(function(t){
    var s=t.setupType||"OTHER", p=parseFloat(getCanonicalRes(t).actualPct)||0;
    if(!m[s])m[s]={t:0,w:0};
    m[s].t++; if(p>0)m[s].w++;
  });
  return Object.keys(m).map(function(k){
    var o=m[k];
    return {setup:k,total:o.t,wr:o.t?o.w/o.t*100:0};
  }).sort(function(a,b){return b.total-a.total});
}
function perfRolling(arr,win,fn){
  var out=[];
  for(var i=0;i<arr.length;i++){
    if(i+1<win){out.push(null);continue;}
    var sub=arr.slice(i+1-win,i+1);
    out.push(fn(sub));
  }
  return out;
}
function perfCorr(a,b){
  var n=Math.min(a.length,b.length);
  if(n<2)return null;
  var x=a.slice(a.length-n), y=b.slice(b.length-n);
  var mx=perfMean(x), my=perfMean(y);
  var num=0,dx=0,dy=0;
  for(var i=0;i<n;i++){
    var vx=x[i]-mx, vy=y[i]-my;
    num+=vx*vy; dx+=vx*vx; dy+=vy*vy;
  }
  if(!dx||!dy)return null;
  return num/Math.sqrt(dx*dy);
}
// ── PER-ACCOUNT HELPERS ──
function perfMonthlyMapForAccount(trades,firmId){
  var m={};
  trades.forEach(function(t){
    if(firmId!=null&&!(t.firmIds||[]).includes(firmId))return;
    var r=firmId!=null?getAccRes(t,firmId):getCanonicalRes(t);
    var p=parseFloat(r.actualPct);
    if(!r.outcome||r.outcome.includes("Running")||isNaN(p)||r.actualPct==null||r.actualPct==="")return;
    var d=parseDate(t.timestamp);if(!d)return;
    var k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    if(!m[k])m[k]={ret:0,trades:0,wins:0,losses:0};

function rpt_monthKey(d){if(!d||isNaN(d))return null;return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}

function rpt_sharpeSortino(arr){

  var v=arr.reduce(function(a,b){return a+Math.pow(b-mean,2)},0)/(arr.length-1);

function calcStats(trades,acctSize,firmId){

  var trades=props.trades||[],firms=props.firms||[];

  var selAccId=accState[0],setSelAccId=accState[1];
  var periodState=useState("monthly");
  var period=periodState[0],setPeriod=periodState[1];
  var pvState=useState(false);
  var pv=pvState[0],setPv=pvState[1];
  var now=new Date();
  var defMonth=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  var monthState=useState(defMonth);
  var selMonth=monthState[0],setSelMonth=monthState[1];
  function thisWeekStart(){var d=new Date();d.setHours(0,0,0,0);var dow=d.getDay()||7;d.setDate(d.getDate()+1-dow);return d.toISOString().substring(0,10);}
  var weekState=useState(thisWeekStart());
  var selWeek=weekState[0],setSelWeek=weekState[1];
  var defQ=now.getFullYear()+"-Q"+(Math.floor(now.getMonth()/3)+1);
  var quarterState=useState(defQ);
  var selQuarter=quarterState[0],setSelQuarter=quarterState[1];
  var qOpts=[];for(var y2=2025;y2<=2030;y2++){for(var q=1;q<=4;q++){qOpts.push(y2+"-Q"+q);}}
  var selFirm=firms.find(function(f){return String(f.id)===selAccId});
  var firmId=selFirm?selFirm.id:null;
  var acctSize=selFirm?selFirm.accountSize:100000;
  // collect week keys from trade dates
  var weekSet={};
  trades.forEach(function(t){var d=parseDate(t.timestamp);if(d&&(t.firmIds||[]).includes(firmId)){weekSet[getWk(d)]=true;}});
  var weekOpts=Object.keys(weekSet).sort().reverse().slice(0,52);
  // month options: 2025-01 to 2030-12
  var monthOpts=[];for(var ym2=2025;ym2<=2030;ym2++){for(var mo=1;mo<=12;mo++){monthOpts.push(ym2+"-"+String(mo).padStart(2,"0"));}}

  function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
  function tradesForPeriod(){
    if(!firmId)return[];
    var ft=trades.filter(function(t){return(t.firmIds||[]).includes(firmId);});
    if(period==="weekly"){
      var wStart=new Date(selWeek+"T00:00:00");
      var wEnd=addDays(wStart,7);
      return ft.filter(function(t){var d=parseDate(t.timestamp);return d&&d>=wStart&&d<wEnd;});
    }
    if(period==="monthly"){
      return ft.filter(function(t){var d=parseDate(t.timestamp);return d&&(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"))===selMonth;});
    }
    if(period==="quarterly"){
      return ft.filter(function(t){var d=parseDate(t.timestamp);return d&&rpt_quarterKey(d)===selQuarter;});
    }
    return ft;
  }
  function reportLabel(){
    if(period==="weekly")return"Week of "+selWeek;
    if(period==="monthly")return selMonth;
    if(period==="quarterly")return selQuarter;
    return"";
  }
  var periodTrades=tradesForPeriod();
  var closed=rpt_closedTradesForAccount(periodTrades,firmId);
  var pnlPct=closed.reduce(function(s,t){return s+(parseFloat(getAccRes(t,firmId).actualPct)||0);},0);
  var pnlDollar=acctSize*pnlPct/100;
  var wins=closed.filter(function(t){return parseFloat(getAccRes(t,firmId).actualPct)>0;});
  var losses=closed.filter(function(t){return parseFloat(getAccRes(t,firmId).actualPct)<0;});
  var wr=closed.length?Math.round(wins.length/closed.length*100):0;
  var gp=wins.reduce(function(s,t){return s+(parseFloat(getAccRes(t,firmId).actualPct)||0);},0);
  var gl=Math.abs(losses.reduce(function(s,t){return s+(parseFloat(getAccRes(t,firmId).actualPct)||0);},0));
  var pf=gl>0?gp/gl:(wins.length?99:0);
  var bestPct=closed.length?closed.reduce(function(b,t){return Math.max(b,parseFloat(getAccRes(t,firmId).actualPct)||0);},0):0;
  var worstPct=closed.length?closed.reduce(function(b,t){return Math.min(b,parseFloat(getAccRes(t,firmId).actualPct)||0);},0):0;
  var periodEq=perfEquitySeriesForAccount(periodTrades,acctSize,firmId);
  var periodDD=perfDrawdownSeries(periodEq);

        h("div",{style:{display:"flex",gap:5}},
          ["weekly","monthly","quarterly"].map(function(p){return h("button",{key:p,onClick:function(){setPeriod(p);},style:btnStyle(period===p)},p);})
        )
      )
    ),
    h("div",{style:{marginBottom:12}},

    ),
    // Stats
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:8}},
      h(StatTile,{label:"Period P&L",value:(pnlPct>=0?"+":"")+pnlPct.toFixed(2)+"%",col:pnlPct>=0?"#34d399":"#ff4444",sub:(pnlDollar>=0?"+ $":"- $")+Math.abs(pnlDollar).toFixed(0)}),

function PerfLineChart(props){
  var data=props.data||[], hgt=props.h||180;
  if(!data.length)return h("div",{style:{height:hgt,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Mono',monospace",fontSize:11,color:"#333"}},"No data");
  var vals=data.map(function(d){return d==null?null:d;}).filter(function(v){return v!=null;});
  if(!vals.length)return h("div",{style:{height:hgt}});
  var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
  if(mx===mn){mx+=1;mn-=1;}
  var W=760,H=hgt,P=20;
  function x(i){return P+(i/(data.length-1||1))*(W-P*2);}
  function y(v){return H-P-((v-mn)/(mx-mn))*(H-P*2);}
  var pts=data.map(function(v,i){return v==null?null:(x(i).toFixed(1)+","+y(v).toFixed(1));}).filter(Boolean).join(" ");
  return h("svg",{viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:hgt,display:"block"}},
    h("line",{x1:P,y1:H-P,x2:W-P,y2:H-P,stroke:"#202020",strokeWidth:"1"}),
    h("polyline",{points:pts,fill:"none",stroke:props.col||"#38bdf8",strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"})
  );
}
function PerfBarChart(props){

  var vals=data.map(function(d){return d.v;});
  var maxAbs=Math.max(1,Math.max.apply(null,vals.map(function(v){return Math.abs(v);}))); 
  var W=760,H=hgt,P=24,bw=(W-P*2)/data.length*0.7,gap=(W-P*2)/data.length*0.3;
  var zeroY=H/2;
  return h("svg",{viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:hgt,display:"block"}},
    h("line",{x1:P,y1:zeroY,x2:W-P,y2:zeroY,stroke:"#222",strokeWidth:"1"}),
    data.map(function(d,i){
      var x=P+i*(bw+gap)+gap/2;

    })

}
function PerfHistogram(props){
  var arr=props.values||[], bins=props.bins||10, hgt=180;
  if(!arr.length)return h("div",{style:{height:hgt,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Mono',monospace",fontSize:11,color:"#333"}},"No R data");
  var mn=Math.min.apply(null,arr), mx=Math.max.apply(null,arr);
  if(mx===mn){mx+=1;mn-=1;}
  var step=(mx-mn)/bins, bucket=new Array(bins).fill(0);
  arr.forEach(function(v){
    var idx=Math.min(bins-1,Math.max(0,Math.floor((v-mn)/step)));
    bucket[idx]++;

  var maxC=Math.max.apply(null,bucket)||1;
  var W=760,H=hgt,P=24,bw=(W-P*2)/bins-2;
  return h("svg",{viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:hgt,display:"block"}},
    bucket.map(function(c,i){
      var hh=(c/maxC)*(H-P*2),x=P+i*((W-P*2)/bins),y=H-P-hh;
      return h("rect",{key:i,x:x,y:y,width:bw,height:hh,fill:"#a78bfa"});

}

function rbFmtDate(d){if(!d)return"[DATE]";return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}
function rbMondayOfWeek(d){var t=new Date(d);t.setHours(0,0,0,0);var dow=t.getDay()||7;t.setDate(t.getDate()+1-dow);return t}
function rbThisMonday(){return rbMondayOfWeek(new Date())}
function rbAddD(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r}
function rbMonthStart(offset){var d=new Date();d.setDate(1);d.setHours(0,0,0,0);d.setMonth(d.getMonth()+offset);return d}
function rbBiweekStart(){var d=new Date();return d.getDate()<=15?new Date(d.getFullYear(),d.getMonth(),1):new Date(d.getFullYear(),d.getMonth(),16)}
function rbBiweekEnd(){var d=new Date();return d.getDate()<=15?new Date(d.getFullYear(),d.getMonth(),15):new Date(d.getFullYear(),d.getMonth()+1,0)}
function rbTradesInRange(trades,s,e){
  // Include a trade if it was entered before period ends AND (still running OR closed after period starts)
  return trades.filter(function(t){
    var entryD=parseDate(t.timestamp);
    if(!entryD)return false;
    if(entryD>e)return false; // entered after period ends — exclude
    // Include if entered on or before end of period
    return true;
  });
}
function rbClosedIn(tArr){return tArr.filter(function(t){var r=getCanonicalRes(t);return r.outcome&&!r.outcome.includes("Running")&&r.actualPct!==""&&r.actualPct!=null&&!isNaN(parseFloat(r.actualPct))})}
function rbWinRate(tArr){var cl=rbClosedIn(tArr);if(!cl.length)return 0;var w=cl.filter(function(t){return parseFloat(getCanonicalRes(t).actualPct)>0});return Math.round(w.length/cl.length*100)}
function rbNetR(tArr){var cl=rbClosedIn(tArr);return cl.reduce(function(s,t){var rp=parseFloat(t.riskPct||1),ap=parseFloat(getCanonicalRes(t).actualPct||0);return s+(rp>0?ap/rp:0)},0)}
function rbNetPct(tArr){return rbClosedIn(tArr).reduce(function(s,t){return s+(parseFloat(getCanonicalRes(t).actualPct)||0)},0)}
function rbFmtR(n){return(n>=0?"+":"")+n.toFixed(2)+"R"}
function rbFmtPct(n){return(n>=0?"+":"")+n.toFixed(2)+"%"}
function fv(u,k,fb){var v=u&&u[k];return (v!==undefined&&v!==null&&String(v).trim()!=="")?String(v):(fb||"[___]")}

// Auto-populated tiles per report (read-only summary at top of form)
function rbAutoTiles(rptKey,trades,firms,selFirm,rangeOverride){
  var range=rbResolveRange(rptKey,rangeOverride);
  // For period trades: entry date <= end of period (trade was entered by period end)
  var tArr=rbTradesInRange(trades,range.start,range.end);
  var cl=rbClosedIn(tArr);
  // Also count trades open/running during the period
  var openDuring=trades.filter(function(t){
    var d=parseDate(t.timestamp);
    if(!d||d>range.end)return false;
    var r=getCanonicalRes(t);
    return !r.outcome||r.outcome.indexOf("Running")>=0;
  });
  var wr=rbWinRate(tArr);
  var nr=rbNetR(tArr);
  var np=rbNetPct(tArr);
  var openCount=openDuring.length;
  var tiles=[
    ["Period",rbFmtDate(range.start)+" — "+rbFmtDate(range.end)],
    ["Closed in Period",String(cl.length)+" trades"],
    ["Running / Open",String(openCount)],
    ["Win Rate (closed)",cl.length?wr+"%":"—"],
    ["Net R (closed)",cl.length?rbFmtR(nr):"—"],
    ["Net % (closed)",cl.length?rbFmtPct(np):"—"],
  ];
  if(selFirm){
    var ft=trades.filter(function(t){return(t.firmIds||[]).indexOf(selFirm.id)>=0});
    var st=calcStats(ft,selFirm.accountSize,selFirm.id);
    var ddPct=st.hwm>0?((st.hwm-st.bal)/st.hwm*100):0;
    var status=ddPct<3?"Green — Normal":ddPct<5?"Amber — Drawdown":"Red — Near Limit";
    tiles.push(["Account",selFirm.name]);
    tiles.push(["Balance","$"+st.bal.toLocaleString(undefined,{maximumFractionDigits:0})]);
    tiles.push(["Status",status]);
  }
  return {tiles:tiles,trades:tArr,range:range};
}
function rbResolveRange(rptKey,override){
  if(override&&override.start&&override.end)return override;
  var def=REPORT_FIELDS[rptKey];
  if(!def)return {start:rbThisMonday(),end:rbAddD(rbThisMonday(),4)};
  if(def.period==="week"){var s=rbThisMonday();return {start:s,end:rbAddD(s,4)}}
  if(def.period==="lastWeek"){var s=rbThisMonday();s.setDate(s.getDate()-7);return {start:s,end:rbAddD(s,4)}}
  if(def.period==="biweek"){return {start:rbBiweekStart(),end:rbBiweekEnd()}}
  if(def.period==="lastBiweek"){var s=rbBiweekStart();var s2=new Date(s);s2.setDate(s2.getDate()-14);var e2=new Date(s);e2.setDate(e2.getDate()-1);return {start:s2,end:e2}}
  if(def.period==="month"){var s=rbMonthStart(0);var e=rbMonthStart(1);e.setDate(e.getDate()-1);return {start:s,end:e}}
  if(def.period==="outlook"){var s=new Date();var e=new Date();e.setMonth(e.getMonth()+6);return {start:s,end:e}}
  return {start:rbThisMonday(),end:rbAddD(rbThisMonday(),4)}
}
// Generate period option lists
function rbGenWeekOptions(){
  var opts=[];var mon=rbMondayOfWeek(new Date());
  for(var i=0;i<52;i++){
    var wMon=new Date(mon);wMon.setDate(wMon.getDate()-i*7);
    var wFri=new Date(wMon);wFri.setDate(wFri.getDate()+4);
    opts.push({val:wMon.toISOString().substring(0,10),label:rbFmtDate(wMon)+" — "+rbFmtDate(wFri)});
  }
  return opts;
}
function rbGenBiweekOptions(){
  var opts=[];
  for(var i=0;i<24;i++){
    var d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);
    var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0");
    var ml=d.toLocaleString("en-GB",{month:"short",year:"numeric"});
    opts.push({val:y+"-"+m+"-16",label:ml+" (16th–end)",start:new Date(y,d.getMonth(),16),end:new Date(y,d.getMonth()+1,0)});
    opts.push({val:y+"-"+m+"-01",label:ml+" (1st–15th)",start:new Date(y,d.getMonth(),1),end:new Date(y,d.getMonth(),15)});
  }
  return opts;
}
function rbGenMonthOptions(){
  var opts=[];
  for(var i=0;i<24;i++){
    var d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);
    var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0");
    opts.push({val:y+"-"+m,label:d.toLocaleString("en-GB",{month:"long",year:"numeric"}),start:new Date(y,d.getMonth(),1),end:new Date(y,d.getMonth()+1,0)});
  }
  return opts;
}

  rows.forEach(function(row){r+='<tr><td class="lbl">'+row[0]+'</td><td class="val">'+(row[1]===null||row[1]===undefined?'':String(row[1]))+'</td></tr>';});
  return r+'</table>';
}
function rbTABLE(headers,rows){
  var r='<table><thead><tr>';
  headers.forEach(function(hd){r+='<th>'+hd+'</th>';});
  r+='</tr></thead><tbody>';
  rows.forEach(function(row){
    r+='<tr>';
    row.forEach(function(cell){
      var bg='';var v=cell;
      if(cell&&typeof cell==='object'){bg='background:#'+( cell.bg||'FFFFFF')+';';v=cell.v||'';}
      r+='<td style="'+bg+'">'+(v===null||v===undefined?'':String(v))+'</td>';
    });
    r+='</tr>';
  });
  return r+'</tbody></table>';
}

function rbBuildPdf(rptKey,u,trades,firms,selFirm,rangeOverride){
  var def=REPORT_FIELDS[rptKey];
  if(!def)throw new Error("Unknown report: "+rptKey);
  var auto=rbAutoTiles(rptKey,trades,firms,selFirm,rangeOverride);
  var b='';
  b+='<div class="logo">NGC TRADING</div>';
  b+='<div class="title">'+def.title+'</div>';
  b+='<div class="sub">'+def.subtitle+'</div>';
  b+='<h1>Report Summary</h1>';
  b+=rbTW(auto.tiles);
  // Monthly P&L history
  if(def.includeMonthlyHistory){
    b+='<div class="pb"></div><h1>Monthly P&L History</h1>';
    var mm=rpt_monthMap(trades);var mkeys=rpt_orderedKeys(mm);
    if(mkeys.length){
      b+=rbTABLE(["Month","Trades","Wins","Win%","Net R","Return%","Running"],
        mkeys.map(function(k){
          var md=mm[k];var mt=md.trades||[];var mc=rbClosedIn(mt);
          var mw=mc.filter(function(t){return parseFloat(getCanonicalRes(t).actualPct)>0}).length;
          var mwr=mc.length?Math.round(mw/mc.length*100):0;
          var mnp=md.ret||0;var mnr=rbNetR(mt);var cum=rpt_cumFromMonthMap(mm,k);
          return [k,String(mc.length),String(mw),mc.length?mwr+"%":"—",mc.length?rbFmtR(mnr):"—",
            {v:mc.length?rbFmtPct(mnp):"—",bg:mnp>0?"EAF5EF":mnp<0?"F5EAEA":"FFFFFF"},
            {v:rbFmtPct(cum),bg:cum>0?"EAF5EF":cum<0?"F5EAEA":"FFFFFF"}];
        })
      );
    } else {
      b+='<p style="color:#999;font-style:italic">No monthly data yet.</p>';
    }
  }
  // User sections
  def.sections.forEach(function(sec){
    b+='<h1>'+sec.title+'</h1>';
    b+=rbTW(sec.fields.map(function(fd){return [fd.label,fv(u,fd.key,"[not filled]")];}));
  });
  // Trade log
  if(def.includeTradeLog){
    b+='<div class="pb"></div><h1>Trade Log — '+rbFmtDate(auto.range.start)+' to '+rbFmtDate(auto.range.end)+'</h1>';
    var logTrades=rbClosedIn(auto.trades);
    if(logTrades.length){
      b+=rbTABLE(["#","Date","Pair","Dir","Entry","Exit","R","Exit Type","Score"],
        logTrades.map(function(t,i){
          var r=getCanonicalRes(t);var ap=parseFloat(r.actualPct||0),rp=parseFloat(t.riskPct||1);
          var rMult=rp>0?(ap/rp).toFixed(2)+"R":"—";
          var isEarly=r.exitWhy&&r.exitWhy.toLowerCase().indexOf("early")>=0;
          var sc=(t.c1?1:0)+(t.c2?1:0)+(t.c3?1:0)+(t.c4?1:0)+(t.c5?1:0)+(t.c6?1:0)+(t.c7?1:0)+(t.c8?1:0);
          return [i+1,t.timestamp?t.timestamp.substring(0,9):"—",t.pair||"—",t.direction||"—",
            t.entry||"—",r.exitPrice||"—",
            {v:rMult,bg:ap>0?"EAF5EF":ap<0?"F5EAEA":"FFFFFF"},
            {v:isEarly?"Early Close":r.outcome||"—",bg:isEarly?"FFF8E1":"FFFFFF"},
            sc+"/8"];
        })
      );
    } else {
      b+='<p style="color:#999;font-style:italic">No closed trades in this period.</p>';
    }
  }
  // Per-trade debrief
  if(def.includeTradeDebrief){
    b+='<div class="pb"></div><h1>Per-Trade Debrief</h1>';
    var debriefs=(u&&u.tradeDebriefs)||{};
    var dTrades=rbClosedIn(auto.trades);
    if(dTrades.length===0){
      b+='<p style="color:#999;font-style:italic">No closed trades in period.</p>';
    } else {
      dTrades.forEach(function(t,i){
        var dbr=debriefs[t.id]||{};
        var r=getCanonicalRes(t);
        var ap=parseFloat(r.actualPct||0),rp=parseFloat(t.riskPct||1);
        var actualR=rp>0?(ap/rp).toFixed(2)+"R":"—";
        b+='<h2>Trade #'+(i+1)+' — '+(t.pair||'?')+' '+(t.direction||'')+'  '+actualR+'</h2>';
        b+=rbTW([
          ["Date",t.timestamp?t.timestamp.substring(0,12):"—"],
          ["Entry / Exit",(t.entry||"—")+" → "+(r.exitPrice||"—")],
          ["Result",rbFmtPct(ap)+"  ("+actualR+")"],
          ["Exit Reason",r.exitWhy||r.outcome||"—"],
          ["MFE reached",fv(dbr,"mfe","[not filled]")],
          ["Did price hit target after close?",fv(dbr,"hitAfter","[not filled]")],
          ["Confluence score (1-6)",fv(dbr,"confluence","[not filled]")],
          ["COT aligned?",fv(dbr,"cotAligned","[not filled]")],
          ["What I did well",fv(dbr,"didWell","[not filled]")],
          ["What I'd do differently",fv(dbr,"doDifferently","[not filled]")],
          ["Rule violated?",fv(dbr,"ruleViolated","None / [not filled]")],
        ]);
      });
    }
  }
  return rbHtmlDoc(def.title,b);
}

  // Generate biweek options for the past 12 months

        genMonthOptions().map(function(o){return h("option",{key:o.val,value:o.val},o.label);})

        h("div",null,
          h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:GOLD_C,letterSpacing:1,marginBottom:4}},curReport.label),
          h("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#555",lineHeight:1.6,maxWidth:480}},curReport.desc)

        h("button",{onClick:handleDownload,style:Object.assign({},BS,{background:"rgba(201,162,39,.12)",border:"1px solid rgba(201,162,39,.35)",color:GOLD_C,padding:"10px 20px",fontSize:11,borderRadius:7})},

function App(){
  var trState=useState([]);var trades=trState[0],setTrades=trState[1];
  var fiState=useState(DEF_FIRMS);var firms=fiState[0],setFirms=fiState[1];
  var ruState=useState(DEF_RULES);var rules=ruState[0],setRules=ruState[1];
  var pgState=useState("journal");var page=pgState[0],setPage=pgState[1];
  var flState=useState("all");var filter=flState[0],setFilter=flState[1];
  var scState=useState(false);var showCloud=scState[0],setShowCloud=scState[1];
  var crState=useState(null);var creds=crState[0],setCreds=crState[1];
  var smState=useState("");var syncMsg=smState[0],setSyncMsg=smState[1];
  var ssState=useState("");var syncStatus=ssState[0],setSyncStatus=ssState[1];
  var ipState=useState(null);var installPrompt=ipState[0],setInstallPrompt=ipState[1];
  var saveTimer=useRef(null);
  var isLoading=useRef(true);

  useEffect(function(){
    var d=LS.read();
    if(d){setTrades(d.trades||[]);setFirms(d.firms||DEF_FIRMS);if(d.rules)setRules(d.rules)}
    var c=CREDS.get();
    if(c&&c.apiKey&&c.binId){
      setCreds(c);setSyncStatus("syncing");setSyncMsg("Syncing...");
      CLOUD.read(c.binId,c.apiKey).then(function(data){if(data){setTrades(data.trades||[]);setFirms(data.firms||DEF_FIRMS);if(data.rules)setRules(data.rules)}setSyncStatus("synced");setSyncMsg("Synced "+new Date().toLocaleTimeString()+" — "+c.binId.substring(0,8)+"...");isLoading.current=false}).catch(function(e){setSyncStatus("error");setSyncMsg("Sync failed: "+e.message);isLoading.current=false});
    } else {setSyncMsg("Saved locally");isLoading.current=false}
    var h2=function(e){e.preventDefault();setInstallPrompt(e)};
    window.addEventListener("beforeinstallprompt",h2);
    return function(){window.removeEventListener("beforeinstallprompt",h2)};
  },[]);

  function saveAll(t,f,r){
    var data={trades:t,firms:f,rules:r,savedAt:new Date().toISOString()};LS.write(data);
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(function(){
      var c=CREDS.get();
      if(c&&c.binId&&c.apiKey){setSyncStatus("syncing");setSyncMsg("Saving...");CLOUD.write(c.binId,c.apiKey,data).then(function(){setSyncStatus("synced");setSyncMsg("Saved "+new Date().toLocaleTimeString())}).catch(function(){setSyncStatus("error");setSyncMsg("Cloud save failed — kept locally")})}
      else setSyncMsg("Saved locally");
    },1500);
  }
  useEffect(function(){if(!isLoading.current)saveAll(trades,firms,rules)},[trades,firms,rules]);

  function manualSync(){var c=CREDS.get();if(!c){setShowCloud(true);return}setSyncStatus("syncing");setSyncMsg("Syncing...");CLOUD.read(c.binId,c.apiKey).then(function(data){if(data){setTrades(data.trades||[]);setFirms(data.firms||DEF_FIRMS);if(data.rules)setRules(data.rules)}setSyncStatus("synced");setSyncMsg("Synced "+new Date().toLocaleTimeString())}).catch(function(e){setSyncStatus("error");setSyncMsg("Sync failed: "+e.message)})}
  function exportBk(){var a=document.createElement("a");a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify({trades:trades,firms:firms,rules:rules,savedAt:new Date().toISOString()},null,2));a.download="NBS_Backup_"+new Date().toISOString().substring(0,10)+".json";a.click()}
  function importBk(){var inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.trades)setTrades(d.trades);if(d.firms)setFirms(d.firms);if(d.rules)setRules(d.rules);alert("Imported "+(d.trades?d.trades.length:0)+" trades.")}catch(ex){alert("Invalid backup file.")}};r.readAsText(f)};inp.click()}

  if(showCloud)return h(CloudSetup,{onDone:function(c,data){if(c){setCreds(c);if(data){setTrades(data.trades||[]);setFirms(data.firms||DEF_FIRMS);if(data.rules)setRules(data.rules)}setSyncMsg("Cloud active — "+c.binId.substring(0,8)+"...");setSyncStatus("synced")}else{setSyncMsg("Saved locally");setSyncStatus("")}setShowCloud(false)}});

  var filtered=trades.filter(function(t){if(filter==="all")return true;var r=getAccRes(t,null);if(filter==="open")return !r.outcome||r.outcome.includes("Running");return r.outcome&&r.outcome.includes(filter)});
  function addTrade(t){setTrades(function(p){return [t].concat(p)})}
  function updateTrade(id,data){setTrades(function(p){return p.map(function(t){return t.id===id?Object.assign({},t,data):t})})}
  function deleteTrade(id){if(window.confirm("Delete this trade?"))setTrades(function(p){return p.filter(function(t){return t.id!==id})})}
  function addFirm(f){setFirms(function(p){return p.concat([f])})}
  function updateFirm(id,data){setFirms(function(p){return p.map(function(f){return f.id===id?Object.assign({},f,data):f})})}
  function deleteFirm(id){setFirms(function(p){return p.filter(function(f){return f.id!==id})});setTrades(function(p){return p.map(function(t){return Object.assign({},t,{firmIds:(t.firmIds||[]).filter(function(x){return x!==id})})})})}

  var syncColor=syncStatus==="synced"?"#34d399":syncStatus==="syncing"?"#f0a500":syncStatus==="error"?"#ff4444":"#444";
	var navItems=[{id:"journal",l:"Journal"},{id:"calendar",l:"Calendar"},{id:"firms",l:"Accounts"},{id:"rules",l:"Rules"},{id:"news",l:"News"},{id:"performance",l:"Performance"},{id:"reports",l:"Reports"},{id:"new",l:"+ Trade"}];
  return h("div",{style:{minHeight:"100vh",background:"#070707"}},
    h("div",{style:{position:"sticky",top:0,zIndex:50,background:"rgba(7,7,7,.97)",backdropFilter:"blur(14px)",borderBottom:"1px solid #111"}},
      h("div",{style:{maxWidth:720,margin:"0 auto",padding:"9px 13px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:7,flexWrap:"wrap"}},
        h("div",null,
          h("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:4,color:"#c8f135",textTransform:"uppercase",marginBottom:1}},"NBS Trading"),
          h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:1,color:"white",lineHeight:1}},"Trade Journal v12")
        ),
        h("div",{style:{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}},
          navItems.map(function(n){return h("button",{key:n.id,onClick:function(){setPage(n.id)},style:Object.assign({},BS,{padding:"6px 10px",fontSize:10,background:page===n.id?(n.id==="new"?"rgba(200,241,53,.12)":"#171717"):"none",border:"1px solid "+(page===n.id?(n.id==="new"?"rgba(200,241,53,.25)":"#252525"):"transparent"),color:page===n.id?(n.id==="new"?"#c8f135":"white"):"#555"})},n.l)}),
          h("div",{style:{display:"flex",gap:3,marginLeft:3}},
            h("button",{onClick:syncStatus==="error"?function(){CREDS.clear();setCreds(null);setShowCloud(true)}:creds?manualSync:function(){setShowCloud(true)},style:Object.assign({},BS,{padding:"6px 9px",fontSize:9,background:syncStatus==="error"?"rgba(255,68,68,.1)":"none",border:"1px solid "+(syncStatus==="error"?"rgba(255,68,68,.3)":creds?"#1e1e1e":"rgba(56,189,248,.2)"),color:creds?syncColor:"#38bdf8"})},syncStatus==="error"?"! fix":creds?(syncStatus==="syncing"?"~":"⊙"):"+Sync"),
            h("button",{onClick:exportBk,style:Object.assign({},BS,{padding:"6px 9px",fontSize:9,background:"none",border:"1px solid #1e1e1e",color:"#555"})},"save"),
            h("button",{onClick:importBk,style:Object.assign({},BS,{padding:"6px 9px",fontSize:9,background:"none",border:"1px solid #1e1e1e",color:"#555"})},"load"),
            installPrompt&&h("button",{onClick:function(){installPrompt.prompt()},style:Object.assign({},BS,{padding:"6px 9px",fontSize:9,background:"rgba(200,241,53,.08)",border:"1px solid rgba(200,241,53,.2)",color:"#c8f135"})},"install")
          )
        )
      ),
      syncMsg&&h("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:9,color:syncColor,letterSpacing:1,textAlign:"center",padding:"2px 0 4px",borderTop:"1px solid #0e0e0e"}},syncMsg)
    ),
    h("div",{style:{maxWidth:720,margin:"0 auto",padding:"15px 13px"}},
      page==="new"&&h(NewTradeForm,{onSave:function(t){addTrade(t);setPage("journal")},onCancel:function(){setPage("journal")},firms:firms,trades:trades}),
      page==="journal"&&h("div",{className:"fade"},
        h(SecurityBanner,null),
        h(StatsBar,{trades:trades}),
        h("div",{style:{display:"flex",gap:4,marginBottom:11,flexWrap:"wrap"}},
          ["all","open","Win","Loss","Breakeven"].map(function(fv){return h("button",{key:fv,onClick:function(){setFilter(fv)},style:Object.assign({},BS,{padding:"5px 9px",fontSize:9,background:filter===fv?"#171717":"none",border:"1px solid "+(filter===fv?"#252525":"#111"),color:filter===fv?"white":"#444"})},fv)})
        ),
        filtered.length===0
          ?h("div",{style:{textAlign:"center",padding:"60px 0",fontFamily:"'DM Mono',monospace",fontSize:12,color:"#222"}},trades.length===0?"No trades yet — tap + Trade":"No trades match filter")
          :filtered.map(function(t){return h(TradeCard,{key:t.id,trade:t,onUpdate:updateTrade,onDelete:deleteTrade,firms:firms,firmId:null,allTrades:trades})})
      ),
      page==="calendar"&&h("div",{className:"fade"},h(CalendarView,{trades:trades})),
      page==="firms"&&h(FirmsPage,{firms:firms,trades:trades,onUpdate:updateFirm,onDelete:deleteFirm,onAdd:addFirm,onReorder:function(arr){setFirms(arr)},onUpdateTrade:updateTrade,onDeleteTrade:deleteTrade}),
      page==="rules"&&h(RulesPage,{rules:rules,onUpdate:function(r){setRules(r)}}),
      page==="news"&&h(ForexNews,null),
		page==="performance"&&h(PerformancePage,{trades:trades,firms:firms}),
		page==="reports"&&h(ReportsPage,{trades:trades,firms:firms})

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
})();
