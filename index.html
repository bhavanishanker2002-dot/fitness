<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bhavani's Fitness Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f6f0e3;--bg2:#fff9ef;--bg3:#efe5d4;--bg4:#e2d4be;--tx:#1f2937;--tx2:#6b7280;--tx3:#8b7963;--blue:#1d4ed8;--teal:#0f766e;--green:#15803d;--orange:#d97706;--red:#c2410c;--purple:#7c3aed;--gold:#b45309;--r:18px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:radial-gradient(circle at top left,rgba(15,118,110,.12),transparent 22%),radial-gradient(circle at top right,rgba(217,119,6,.15),transparent 22%),var(--bg);color:var(--tx);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(246,240,227,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(31,41,55,.08)}
.nav-in{max-width:1400px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:16px;font-weight:800;background:linear-gradient(135deg,#0f766e,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;gap:6px;overflow-x:auto}.tab{padding:8px 14px;border-radius:999px;border:none;background:rgba(31,41,55,.04);color:var(--tx2);font:600 12px 'Inter',sans-serif;cursor:pointer;transition:.2s;white-space:nowrap}.tab:hover{background:var(--bg3);color:var(--tx)}.tab.on{background:var(--tx);color:var(--bg2)}
.main{max-width:1400px;margin:0 auto;padding:64px 20px 40px}.page{display:none}.page.on{display:block}
.card{background:rgba(255,249,239,.92);border-radius:var(--r);border:1px solid rgba(31,41,55,.08);padding:20px;margin-bottom:14px;box-shadow:0 12px 30px rgba(31,41,55,.06)}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.card-t{font-size:15px;font-weight:700}
.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:800px){.g2,.g3,.g4{grid-template-columns:1fr}}
.stat{background:var(--bg3);border-radius:12px;padding:16px;text-align:center}.stat-v{font-size:24px;font-weight:800;margin-bottom:2px}.stat-l{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:1px}
.pills{display:flex;gap:3px;margin-bottom:18px}.pill{flex:1;padding:8px 4px;border-radius:8px;text-align:center;font-size:10px;font-weight:600;cursor:pointer;border:2px solid transparent;opacity:.4;transition:.2s}.pill.on{opacity:1;border-color:rgba(255,255,255,.5)}.pill.done{opacity:.8}
.row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;margin-bottom:4px;background:var(--bg3);transition:.15s;font-size:13px}.row:hover{background:var(--bg4)}
.row-n{flex:1;font-weight:600}.row-d{font-size:11px;color:var(--tx2);min-width:60px;text-align:center}.row-note{font-size:10px;color:var(--orange);font-weight:500;max-width:180px}
.yt{padding:4px 10px;border-radius:5px;background:rgba(220,38,38,.12);color:var(--red);border:none;font:600 11px 'Inter',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px;transition:.2s}.yt:hover{background:rgba(220,38,38,.25)}
.btn{padding:8px 16px;border-radius:8px;border:none;font:600 12px 'Inter',sans-serif;cursor:pointer;transition:.2s}.btn-p{background:var(--blue);color:#fff}.btn-p:hover{filter:brightness(1.2)}.btn-d{background:rgba(248,113,113,.12);color:var(--red)}.btn-s{padding:5px 10px;font-size:11px}.btn-o{background:var(--bg4);color:var(--tx2)}.btn-o:hover{color:var(--tx)}
input,select,textarea{background:var(--bg3);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 12px;color:var(--tx);font:14px 'Inter',sans-serif;outline:0;transition:.2s;width:100%}input:focus,textarea:focus{border-color:var(--blue)}
.ig{display:flex;flex-direction:column;gap:3px}.ig label{font-size:10px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.alert{border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600}
.meal-b{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid;position:relative}
.meal-time{font-size:10px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:1px}.meal-name{font-size:14px;font-weight:700;margin:3px 0 6px}
.chat-msgs{height:380px;overflow-y:auto;padding:16px}.ch-m{margin-bottom:14px;display:flex;gap:8px}.ch-m.user{flex-direction:row-reverse}
.ch-b{padding:10px 14px;border-radius:12px;max-width:80%;font-size:13px;line-height:1.6;white-space:pre-wrap}.ch-m.bot .ch-b{background:var(--bg3)}.ch-m.user .ch-b{background:var(--blue);color:#fff}
.ch-in{display:flex;gap:6px;padding:12px;border-top:1px solid rgba(255,255,255,.05)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border-radius:var(--r);padding:24px;max-width:550px;width:92%;border:1px solid rgba(255,255,255,.1);max-height:80vh;overflow-y:auto}.modal h3{margin-bottom:14px;font-size:16px}
.slabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:10px 14px;margin:8px 0 4px;border-radius:8px;display:flex;align-items:center;gap:8px}
.ptable{width:100%;border-collapse:separate;border-spacing:0 3px}.ptable th{text-align:left;padding:8px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3)}.ptable td{padding:8px 12px;background:var(--bg3);font-size:12px}.ptable tr td:first-child{border-radius:8px 0 0 8px}.ptable tr td:last-child{border-radius:0 8px 8px 0}
.calis-c{background:var(--bg3);border-radius:12px;padding:14px;text-align:center}.calis-v{font-size:28px;font-weight:800;margin:6px 0}.calis-bar{height:5px;background:var(--bg4);border-radius:3px;margin-top:6px;overflow:hidden}.calis-fill{height:100%;border-radius:3px;transition:width .4s}
.edit-ico{opacity:0;transition:.2s;cursor:pointer;color:var(--tx3);font-size:11px}.row:hover .edit-ico,.meal-b:hover .edit-ico{opacity:1}
.add-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:10px;border:2px dashed rgba(255,255,255,.08);color:var(--tx3);font-size:12px;font-weight:600;cursor:pointer;transition:.2s;margin-top:4px}.add-row:hover{border-color:var(--blue);color:var(--blue)}
</style>
</head>
<body>
<nav class="nav"><div class="nav-in"><div class="logo">BHAVANI'S BLUEPRINT</div><div class="tabs" id="navT"></div></div></nav>
<div class="main" id="app"></div>
<script>
const S={tab:'dash',day:null,phase:null,startDate:null,logs:[],calis:{},workouts:null,meals:null,cardio:null,warmup:null,profile:null};
function load(){try{const d=localStorage.getItem('bf4');if(d)Object.assign(S,JSON.parse(d))}catch(e){}if(!S.startDate)S.startDate=new Date().toISOString().split('T')[0];if(!S.workouts)S.workouts=defW();if(!S.meals)S.meals=defM();if(!S.cardio)S.cardio=defC();if(!S.warmup)S.warmup=defWU();if(!S.profile)S.profile=defP();if(S.day===null)S.day=tIdx();if(S.phase===null)S.phase=cPh();save()}
function save(){try{localStorage.setItem('bf4',JSON.stringify(S))}catch(e){}}
const PH=[{id:1,name:"Foundation",wk:[1,4],wt:"110→106",bf:"36→33%",cal:2000,loss:"1 kg/wk",color:"#4f8fff",focus:"Learn form"},{id:2,name:"Build Base",wk:[5,8],wt:"106→102",bf:"33→29%",cal:2000,loss:"1 kg/wk",color:"#2dd4bf",focus:"Progressive overload"},{id:3,name:"Intensity",wk:[9,12],wt:"102→98",bf:"29→25%",cal:1950,loss:"1 kg/wk",color:"#4ade80",focus:"Supersets, circuits"},{id:4,name:"Conditioning",wk:[13,16],wt:"98→94",bf:"25→22%",cal:1950,loss:"1 kg/wk",color:"#fb923c",focus:"MMA prep"},{id:5,name:"MMA Entry",wk:[17,24],wt:"94→86",bf:"22→17%",cal:2200,loss:"1 kg/wk",color:"#f87171",focus:"BJJ+Muay Thai"},{id:6,name:"Full Combat",wk:[25,40],wt:"86→80",bf:"17→12%",cal:2350,loss:"0.5 kg/wk",color:"#a78bfa",focus:"BJJ+MT+Wrestling"},{id:7,name:"Greek God",wk:[41,52],wt:"80→78",bf:"12→10%",cal:2400,loss:"0.5 kg/wk",color:"#fbbf24",focus:"Peak everything"}];
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];const DCOL=['#4f8fff','#2dd4bf','#4ade80','#a78bfa','#fb923c','#f87171','#6b7280'];
function cWk(){const s=new Date(S.startDate),n=new Date();return Math.max(1,Math.floor((n-s)/(7*864e5))+1)}
function cPh(){const w=cWk();for(let i=PH.length-1;i>=0;i--)if(w>=PH[i].wk[0])return i;return 0}
function tIdx(){const d=new Date().getDay();return d===0?6:d-1}
function ytl(q){return'https://www.youtube.com/results?search_query='+encodeURIComponent(q+' proper form tutorial')}
function defWU(){return[{name:"Arm Circles",sets:"30s each",note:"Loosen shoulders",yt:ytl("arm circles warmup")},{name:"Jumping Jacks",sets:"2×20",note:"Heart rate up",yt:ytl("jumping jacks")},{name:"Hip Circles",sets:"10 each",note:"Hip mobility",yt:ytl("hip circles")},{name:"Cat-Cow Stretch",sets:"10 reps",note:"Spine mobility",yt:ytl("cat cow stretch")},{name:"Band Pull-Aparts",sets:"2×15",note:"Shoulder health",yt:ytl("band pull apart")},{name:"Bodyweight Squats",sets:"10 reps",note:"If knees OK",yt:ytl("bodyweight squat")},{name:"Plank Hold",sets:"20-30s",note:"Core activation",yt:ytl("plank warmup")}]}
function defC(){return{1:[{name:"Slow Walk (flat)",dur:"15 min",int:"Very easy",steps:"1,500-2,000",yt:ytl("walking beginner")},{name:"OR Stationary Cycling",dur:"15 min",int:"Very easy",steps:"—",yt:ytl("stationary bike beginner")},{name:"Jump Rope (if no pain)",dur:"3 min (30s on/off)",int:"Easy",steps:"—",yt:ytl("jump rope beginner")}],2:[{name:"Walk Intervals",dur:"20 min",int:"Easy",steps:"2,500-3,000",yt:ytl("walk intervals")},{name:"Jump Rope",dur:"5 min",int:"Easy-Moderate",steps:"—",yt:ytl("jump rope 5 min")}],3:[{name:"Continuous Walk",dur:"25 min",int:"Moderate",steps:"3,500-4,000",yt:ytl("brisk walking")},{name:"Jump Rope",dur:"8 min",int:"Moderate",steps:"—",yt:ytl("jump rope hiit")}],4:[{name:"Walk/Jog Intervals",dur:"30 min",int:"Moderate-Hard",steps:"4,500-5,500",yt:ytl("walk jog intervals")},{name:"Jump Rope HIIT",dur:"10 min",int:"Hard",steps:"—",yt:ytl("jump rope hiit 10")},{name:"Shadow Boxing",dur:"3×2 min",int:"Hard",steps:"—",yt:ytl("shadow boxing beginner")}],5:[{name:"Running",dur:"20-25 min",int:"Moderate",steps:"10,000+",yt:ytl("running beginners")},{name:"Jump Rope HIIT",dur:"12 min",int:"Hard",steps:"—",yt:ytl("jump rope advanced")}],6:[{name:"Running",dur:"25-30 min",int:"High pace",steps:"12,000+",yt:ytl("running speed")},{name:"MMA Circuit",dur:"15 min",int:"Fight pace",steps:"—",yt:ytl("mma conditioning")}],7:[{name:"Running",dur:"30 min sustained",int:"Race pace",steps:"12-15K",yt:ytl("30 min run")},{name:"MMA Conditioning",dur:"20 min",int:"Fight pace",steps:"—",yt:ytl("mma cardio")}]}}
function defW(){const w={};w[0]={name:"PUSH (V-Taper)",color:"#4f8fff",exercises:[{name:"Seated Shoulder Press",sets:"4×12",rest:"90s",note:"V-TAPER shoulders first",yt:ytl("seated dumbbell shoulder press")},{name:"Lateral Raises",sets:"4×15",rest:"60s",note:"V-TAPER wide delts",yt:ytl("dumbbell lateral raises")},{name:"Flat Dumbbell Press",sets:"3×12",rest:"90s",note:"Squeeze chest top",yt:ytl("flat dumbbell press")},{name:"Incline Dumbbell Press",sets:"3×12",rest:"90s",note:"30° angle",yt:ytl("incline dumbbell press")},{name:"Overhead Tricep Extension",sets:"3×12",rest:"60s",note:"EZ bar",yt:ytl("overhead tricep extension")},{name:"Push-ups",sets:"2×max",rest:"60s",note:"Track weekly",yt:ytl("perfect push up")}]};
w[1]={name:"PULL (V-Taper)",color:"#2dd4bf",exercises:[{name:"Bent Over Rows",sets:"4×12",rest:"90s",note:"V-TAPER wide back",yt:ytl("bent over row")},{name:"Single Arm DB Rows",sets:"3×12 each",rest:"60s",note:"Lats focus",yt:ytl("single arm dumbbell row")},{name:"Face Pulls (band)",sets:"3×15",rest:"60s",note:"Rear delts+posture",yt:ytl("face pulls band")},{name:"Pull-up Negatives",sets:"3×5",rest:"90s",note:"Key calisthenics",yt:ytl("pull up negatives")},{name:"Dead Hang",sets:"3×max",rest:"60s",note:"Grip+BJJ prep",yt:ytl("dead hang")},{name:"Barbell Curls",sets:"3×12",rest:"60s",note:"No swinging",yt:ytl("barbell curl")},{name:"Hammer Curls",sets:"3×12",rest:"60s",note:"Forearms",yt:ytl("hammer curl")}]};
w[2]={name:"LEGS (Back/Knee Safe)",color:"#4ade80",exercises:[{name:"Hip Thrusts (barbell)",sets:"4×12",rest:"90s",note:"MOST IMPORTANT",yt:ytl("barbell hip thrust")},{name:"Glute Bridges",sets:"3×15",rest:"60s",note:"Squeeze top",yt:ytl("glute bridge")},{name:"Romanian Deadlift (light)",sets:"3×10",rest:"90s",note:"Slight knee bend",yt:ytl("romanian deadlift")},{name:"Goblet Squats (partial)",sets:"3×12",rest:"90s",note:"Only if knees OK",yt:ytl("goblet squat")},{name:"Calf Raises",sets:"4×20",rest:"45s",note:"Slow controlled",yt:ytl("calf raise")},{name:"Bird Dogs",sets:"3×10 each",rest:"30s",note:"Core+back",yt:ytl("bird dog exercise")}]};
w[3]={name:"PUSH Light+Shoulders",color:"#a78bfa",exercises:[{name:"Lateral Raises",sets:"4×15",rest:"60s",note:"V-TAPER extra",yt:ytl("lateral raise")},{name:"Arnold Press",sets:"3×12",rest:"60s",note:"Rotation",yt:ytl("arnold press")},{name:"Incline DB Flyes",sets:"3×12",rest:"60s",note:"Stretch bottom",yt:ytl("incline fly")},{name:"Front Raises",sets:"3×12",rest:"60s",note:"Alternate",yt:ytl("front raise")},{name:"Bench Dips",sets:"3×12",rest:"60s",note:"Calisthenics prep",yt:ytl("bench dips")},{name:"Push-ups",sets:"3×max",rest:"60s",note:"Perfect form",yt:ytl("push ups")}]};
w[4]={name:"PULL+CORE",color:"#fb923c",exercises:[{name:"Inverted Rows",sets:"4×10",rest:"90s",note:"Bar in cage",yt:ytl("inverted row")},{name:"DB Pullovers",sets:"3×12",rest:"60s",note:"V-TAPER lats",yt:ytl("dumbbell pullover")},{name:"Reverse Flyes",sets:"3×15",rest:"60s",note:"Rear delts",yt:ytl("reverse fly")},{name:"Concentration Curls",sets:"3×12 each",rest:"60s",note:"Strict",yt:ytl("concentration curl")},{name:"Planks",sets:"3×45s",rest:"60s",note:"Build to 60s",yt:ytl("plank form")},{name:"Dead Bugs",sets:"3×10 each",rest:"30s",note:"Core stability",yt:ytl("dead bug")},{name:"L-Sit Tuck Hold",sets:"3×max",rest:"60s",note:"Calisthenics",yt:ytl("l sit progression")}]};
w[5]={name:"LEGS+CONDITIONING",color:"#f87171",exercises:[{name:"Step-ups (low)",sets:"3×12 each",rest:"60s",note:"Bench lowest",yt:ytl("step ups")},{name:"Sumo Squats",sets:"3×12",rest:"90s",note:"Hip mobility",yt:ytl("sumo squat")},{name:"Lying Leg Curls (band)",sets:"3×15",rest:"60s",note:"Hamstrings",yt:ytl("lying leg curl band")},{name:"Standing Calf Raises",sets:"4×20",rest:"45s",note:"Hold top",yt:ytl("calf raise")},{name:"McGill Curl-ups",sets:"3×10",rest:"30s",note:"Safe abs",yt:ytl("mcgill curl up")},{name:"Side Planks",sets:"3×20s each",rest:"30s",note:"Obliques",yt:ytl("side plank")}]};
w[6]={name:"ACTIVE RECOVERY",color:"#6b7280",exercises:[{name:"Light Walk",sets:"15-20 min",rest:"—",note:"Pain limit",yt:ytl("walking recovery")},{name:"Full Body Stretching",sets:"15 min",rest:"—",note:"Hips hamstrings",yt:ytl("full body stretch")},{name:"Foam Rolling",sets:"10 min",rest:"—",note:"Legs back",yt:ytl("foam rolling")},{name:"Hip Flexor Stretches",sets:"5 min",rest:"—",note:"MMA essential",yt:ytl("hip flexor stretch")}]};return w}
function defM(){return[{time:"7:30 AM",name:"Breakfast",color:"#fb923c",items:[{food:"Pintola HP Oats",qty:"50g",cal:196,pro:12.5,fat:4},{food:"Amul Gold Milk",qty:"200ml",cal:130,pro:7,fat:6.6},{food:"MyProtein Whey",qty:"25g (1 scoop)",cal:103,pro:21,fat:1.9},{food:"Banana",qty:"1 medium",cal:89,pro:1.1,fat:.3},{food:"Mixed Seeds",qty:"20g",cal:115,pro:4,fat:9},{food:"Kaju",qty:"10g",cal:55,pro:1.8,fat:4.4}]},{time:"10:30 AM",name:"Mid-Morning",color:"#a78bfa",items:[{food:"Almonds",qty:"10g",cal:58,pro:2.1,fat:5},{food:"Walnuts",qty:"10g",cal:65,pro:1.5,fat:6.5}]},{time:"1:00 PM",name:"Lunch — Telugu Thali",color:"#4ade80",items:[{food:"White Rice",qty:"200g",cal:260,pro:5,fat:.5},{food:"Toor Dal",qty:"50g",cal:60,pro:3.5,fat:.3},{food:"Curry",qty:"1 serving",cal:75,pro:1.5,fat:4},{food:"Rasam",qty:"100ml",cal:25,pro:1,fat:1}]},{time:"5:00 PM",name:"Dinner — Soya Tikki",color:"#f87171",items:[{food:"Soya Chapati",qty:"2 chapatis",cal:350,pro:26,fat:5.5},{food:"Soya Tikki (air fried)",qty:"30g dry",cal:104,pro:15.6,fat:.5},{food:"Base Curry",qty:"1 serving",cal:100,pro:2,fat:5}]},{time:"7:45 PM",name:"Post-Workout",color:"#4f8fff",items:[{food:"MyProtein Whey (water)",qty:"25g",cal:103,pro:21,fat:1.9}]},{time:"9:30 PM",name:"Before Bed",color:"#a78bfa",items:[{food:"Roasted Chana",qty:"25g",cal:90,pro:5,fat:1.5}]}]}
function defP(){return{name:"Bhavani",age:23,height:"5'8\"",weight:110,bf:36,targetWeight:78,targetBf:10,mmaWeek:12,firstBlock:16,goal:"Greek god physique with calisthenics power and MMA-ready conditioning."}}
const CL=[{name:"Push-ups",icon:"fa-hand-fist",goal:50,unit:"reps",color:"#4f8fff"},{name:"Pull-ups",icon:"fa-arrow-up",goal:20,unit:"reps",color:"#2dd4bf"},{name:"Chin-ups",icon:"fa-arrow-up",goal:10,unit:"reps",color:"#a78bfa"},{name:"Dips",icon:"fa-down-long",goal:10,unit:"reps",color:"#fb923c"},{name:"L-Sit",icon:"fa-chair",goal:20,unit:"sec",color:"#f87171"},{name:"Dead Hang",icon:"fa-grip",goal:120,unit:"sec",color:"#fbbf24"},{name:"Plank",icon:"fa-person",goal:180,unit:"sec",color:"#4ade80"}];
const TB=[{id:'dash',l:'Dashboard',i:'fa-home'},{id:'work',l:'Workout',i:'fa-dumbbell'},{id:'meals',l:'Meals',i:'fa-utensils'},{id:'calis',l:'Calisthenics',i:'fa-person-running'},{id:'track',l:'Tracker',i:'fa-chart-line'},{id:'set',l:'Settings',i:'fa-sliders'}];
function go(id){S.tab=id;R()}let modal=null;function oM(h){modal=h;R()}function cM(){modal=null;R()}
function R(){document.getElementById('navT').innerHTML=TB.map(t=>'<button class="tab '+(S.tab===t.id?'on':'')+'" onclick="go(\''+t.id+'\')"><i class="fas '+t.i+'"></i> '+t.l+'</button>').join('');const p={dash:rD,work:rW,meals:rML,calis:rCL,track:rTR,set:rST};document.getElementById('app').innerHTML='<div class="page on">'+(p[S.tab]||rD)()+'</div>'+(modal?'<div class="modal-bg" onclick="if(event.target===this)cM()"><div class="modal">'+modal+'</div></div>':'');if(S.tab==='track')dCh()}
// DASHBOARD
function rD(){const wk=cWk(),pi=cPh(),p=PH[pi],ti=tIdx(),L=S.logs[S.logs.length-1],h=new Date().getHours(),alerts=[];
if(h>=6&&h<7)alerts.push({i:"fa-shoe-prints",t:"Morning cardio!",bg:"linear-gradient(135deg,#fb923c,#f87171)"});
if(h>=7&&h<8)alerts.push({i:"fa-bowl-food",t:"Breakfast — Oats+Whey+Milk",bg:"linear-gradient(135deg,#4ade80,#2dd4bf)"});
if(h>=17&&h<18)alerts.push({i:"fa-fire",t:"Pre-workout dinner",bg:"linear-gradient(135deg,#f87171,#fb923c)"});
if(h>=18&&h<20)alerts.push({i:"fa-dumbbell",t:"Workout time!",bg:"linear-gradient(135deg,#4f8fff,#a78bfa)"});
if(h>=21&&h<22)alerts.push({i:"fa-pills",t:"Zinc+Magnesium!",bg:"linear-gradient(135deg,#a78bfa,#f472b6)"});
if(new Date().getDay()===0)alerts.push({i:"fa-sun",t:"SUNDAY — D3 60K + K2!",bg:"linear-gradient(135deg,#fbbf24,#fb923c)"});
const cl=S.cardio[pi+1]||S.cardio[1];

function aLog(){const l={date:document.getElementById('lD').value,weight:parseFloat(document.getElementById('lW').value)||null,bf:parseFloat(document.getElementById('lB').value)||null,steps:parseInt(document.getElementById('lS').value)||null,note:document.getElementById('lN').value};if(!l.weight&&!l.bf&&!l.steps)return alert('Enter a value');S.logs.push(l);S.logs.sort((a,b)=>new Date(a.date)-new Date(b.date));if(l.weight&&S.profile)S.profile.weight=l.weight;if(l.bf&&S.profile)S.profile.bf=l.bf;save();R()}
function dCh(){const wC=document.getElementById('wCh')?.getContext('2d'),bC=document.getElementById('bCh')?.getContext('2d');if(!wC||!bC||!S.logs.length)return;const lb=S.logs.map(l=>new Date(l.date).toLocaleDateString('en-IN',{day:'numeric',month:'short'}));const opt={responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#5a5a70',font:{size:9}},grid:{color:'rgba(255,255,255,.03)'}},y:{ticks:{color:'#5a5a70'},grid:{color:'rgba(255,255,255,.03)'}}}};new Chart(wC,{type:'line',data:{labels:lb,datasets:[{data:S.logs.map(l=>l.weight),borderColor:'#4f8fff',backgroundColor:'rgba(79,143,255,.08)',fill:true,tension:.3,pointRadius:3}]},options:opt});new Chart(bC,{type:'line',data:{labels:lb,datasets:[{data:S.logs.map(l=>l.bf),borderColor:'#fb923c',backgroundColor:'rgba(251,146,60,.08)',fill:true,tension:.3,pointRadius:3}]},options:opt})}
function rST(){const p=S.profile||defP(),pi=cPh(),ph=PH[pi];return '<h1 style="font-size:22px;font-weight:800;margin-bottom:14px"><i class="fas fa-sliders"></i> Settings</h1><div class="g3"><div class="stat"><div class="stat-v" style="color:var(--blue)">'+p.weight+' kg</div><div class="stat-l">Current Weight</div></div><div class="stat"><div class="stat-v" style="color:var(--orange)">'+p.bf+'%</div><div class="stat-l">Current Body Fat</div></div><div class="stat"><div class="stat-v" style="color:var(--green)">'+p.targetWeight+' kg / '+p.targetBf+'%</div><div class="stat-l">Goal</div></div></div><div class="card"><div class="card-h"><span class="card-t">Profile And Goal</span><button class="btn btn-s btn-o" onclick="ePF()"><i class="fas fa-pen"></i> Edit</button></div><div class="row"><span class="row-n">Name</span><span class="row-d">'+p.name+'</span></div><div class="row"><span class="row-n">Age / Height</span><span class="row-d">'+p.age+' / '+p.height+'</span></div><div class="row"><span class="row-n">MMA Entry Goal</span><span class="row-d">Week '+p.mmaWeek+'</span></div><div class="row"><span class="row-n">4-Month Block</span><span class="row-d">'+p.firstBlock+' weeks</span></div><div class="row"><span class="row-n">Current Phase</span><span class="row-d">P'+ph.id+' '+ph.name+'</span></div><p style="font-size:12px;color:var(--tx2);margin-top:10px;line-height:1.6">'+p.goal+'</p></div><div class="card"><div class="card-h"><span class="card-t">Data Tools</span></div><p style="font-size:12px;color:var(--tx2);line-height:1.6;margin-bottom:12px">This site keeps working free on GitHub Pages because it saves in your browser. You can also export your full data backup or edit the full JSON directly.</p><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-p" onclick="expD()"><i class="fas fa-download"></i> Export JSON</button><button class="btn btn-o" onclick="eJS()"><i class="fas fa-code"></i> Edit Full JSON</button></div></div>'}
function ePF(){const p=S.profile||defP();oM('<h3>Edit Profile</h3><div class="ig" style="margin-bottom:8px"><label>Name</label><input id="pN" value="'+p.name+'"></div><div style="display:flex;gap:8px;margin-bottom:8px"><div class="ig" style="flex:1"><label>Age</label><input id="pA" type="number" value="'+p.age+'"></div><div class="ig" style="flex:1"><label>Height</label><input id="pH" value="'+p.height+'"></div></div><div style="display:flex;gap:8px;margin-bottom:8px"><div class="ig" style="flex:1"><label>Current Weight</label><input id="pW" type="number" step="0.1" value="'+p.weight+'"></div><div class="ig" style="flex:1"><label>Current BF%</label><input id="pB" type="number" step="0.1" value="'+p.bf+'"></div></div><div style="display:flex;gap:8px;margin-bottom:8px"><div class="ig" style="flex:1"><label>Target Weight</label><input id="pTW" type="number" step="0.1" value="'+p.targetWeight+'"></div><div class="ig" style="flex:1"><label>Target BF%</label><input id="pTB" type="number" step="0.1" value="'+p.targetBf+'"></div></div><div style="display:flex;gap:8px;margin-bottom:8px"><div class="ig" style="flex:1"><label>MMA Entry Week</label><input id="pMW" type="number" value="'+p.mmaWeek+'"></div><div class="ig" style="flex:1"><label>4-Month Block Weeks</label><input id="pFB" type="number" value="'+p.firstBlock+'"></div></div><div class="ig" style="margin-bottom:14px"><label>Main Goal</label><textarea id="pG">'+p.goal+'</textarea></div><div style="display:flex;gap:8px"><button class="btn btn-p" onclick="sPF()">Save</button><button class="btn btn-o" onclick="cM()">Cancel</button></div>')}
function sPF(){S.profile={name:document.getElementById('pN').value,age:+document.getElementById('pA').value,height:document.getElementById('pH').value,weight:+document.getElementById('pW').value,bf:+document.getElementById('pB').value,targetWeight:+document.getElementById('pTW').value,targetBf:+document.getElementById('pTB').value,mmaWeek:+document.getElementById('pMW').value,firstBlock:+document.getElementById('pFB').value,goal:document.getElementById('pG').value};save();cM()}
function expD(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='bhavani-blueprint-data.json';a.click();URL.revokeObjectURL(u)}
function eJS(){oM('<h3>Edit Full JSON</h3><div class="ig" style="margin-bottom:14px"><label>All data</label><textarea id="jS" style="min-height:320px">'+JSON.stringify(S,null,2).replace(/</g,'&lt;')+'</textarea></div><div style="display:flex;gap:8px"><button class="btn btn-p" onclick="sJS()">Save</button><button class="btn btn-o" onclick="cM()">Cancel</button></div>')}
function sJS(){try{const d=JSON.parse(document.getElementById('jS').value);Object.keys(S).forEach(k=>delete S[k]);Object.assign(S,d);save();cM()}catch(e){alert('Invalid JSON')}} 
load();R();
